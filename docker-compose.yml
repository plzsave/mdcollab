# ローカル検証用のバッキングサービス（Postgres + S3互換）。
# アプリ本体はホストで `bun run dev`（ホットリロード）。compose は DB と S3 だけ建てる。
#   起動: make up   / 停止: make down
services:
  postgres:
    image: postgres:18
    restart: unless-stopped   # reboot 後も自動で立ち上がる（手動 stop した時だけ止まったまま）
    environment:
      POSTGRES_USER: mdcollab
      POSTGRES_PASSWORD: mdcollab
      POSTGRES_DB: mdcollab
    ports:
      - "5432:5432"
    volumes:
      # PostgreSQL 18+ は /var/lib/postgresql 直下(メジャー別サブディレクトリ)にデータを置く規約。
      # 旧来の /var/lib/postgresql/data にマウントすると 18 は起動を拒否する。
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdcollab -d mdcollab"]
      interval: 3s
      timeout: 3s
      retries: 15

  # S3 互換ストレージ。MinIO は使わず SeaweedFS を採用（軽量・単一プロセス・固定キー即利用）。
  # バケットは初回 PUT で自動生成される（Admin 権限の identity）。
  # S3 gateway:8333 / filer browser:8888（デバッグ用）。
  s3:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped   # reboot 後も自動で立ち上がる
    command: server -s3 -dir=/data -s3.config=/etc/seaweedfs/s3.json
    ports:
      - "8333:8333" # S3 API（アプリ/seed が使う）
      - "8888:8888" # filer ブラウザ（中身確認用・任意）
    volumes:
      - ./docker/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
      - seaweeddata:/data
    healthcheck:
      # S3 API(:8333) が応答すれば健全。master(9333) は container IP のみで listen し
      # localhost に bind しないため使えない。未認証の 403 も「起動済み」とみなすので -f は付けない。
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8333 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
  seaweeddata:
