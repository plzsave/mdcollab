name: ci

# 個人(Cloudflare)側の CI/CD。
#   check : 型チェック + テスト + web ビルド（PR と main の両方で実行＝品質ゲート）
#   deploy: main への push のみ。web をビルドして Worker(+[assets]) をデプロイ
# デプロイ実体は scripts/deploy-cf.sh（ローカルでも同じものを使える）。
# 注: Terraform(R2/Hyperdrive) と DB migrate は CI では回さない（手動運用）。

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: make check # typecheck + test（バックエンド）
      - run: bun install --frozen-lockfile
        working-directory: web
      - run: bun run build:web # web の型チェック(tsc) + ビルド

  deploy-cf:
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      # Cloudflare は GitHub OIDC 連携が無いためスコープを絞った API トークンを使う（§5.2）。
      # ランタイム秘密(SESSION_SECRET 等)は `wrangler secret` で投入済み＝デプロイでは不要。
      # 個人のアカウント値はリポジトリに直書きせず、repo の Secrets/Variables から渡す。
      #   Secrets   : CLOUDFLARE_API_TOKEN（必須・秘密） / CLOUDFLARE_ACCOUNT_ID
      #   Variables : BASE_URL / CUSTOM_DOMAIN(任意) / S3_ENDPOINT / S3_BUCKET / HYPERDRIVE_ID
      # deploy-cf.sh → gen-wrangler.sh がこれらから wrangler.toml を生成する。
      - run: make deploy-cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BASE_URL: ${{ vars.BASE_URL }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          HYPERDRIVE_ID: ${{ vars.HYPERDRIVE_ID }}
