name = "mdcollab-api"
main = "src/adapters/cloudflare.ts"
compatibility_date = "2026-06-01"
# postgres.js を Workers で動かすため必須
compatibility_flags = ["nodejs_compat"]

# workers.dev 経路を無効化（迂回防止）。入口を独自ドメイン(md.yskbase.com)だけにする。
# ※ トップレベルキーなので、必ず最初のテーブル見出し([assets]など)より前に置くこと。
workers_dev = false

# フロント(web/)の SPA を同一オリジンで配信。
#   - directory: vite build の出力（デプロイ前に `bun run build:web` 必須）
#   - run_worker_first=["/api/*"]: /api/* だけ Worker(API)へ、それ以外は Asset Worker
#   - not_found_handling=single-page-application: 静的に無いパスは index.html を返す(SPA ルーティング)
# 同一オリジンなので httpOnly セッション Cookie がそのまま効く。
[assets]
directory = "web/dist"
not_found_handling = "single-page-application"
# /health も Worker が応答すべき監視用エンドポイントなので Worker 優先に含める
# （含めないと Asset Worker が SPA フォールバックで index.html を返してしまう）。
run_worker_first = ["/api/*", "/health"]

# Hyperdrive(→Neon)。手順:
#   1) Neon の接続文字列を用意
#   2) wrangler hyperdrive create mdcollab-neon --connection-string="postgres://..."
#   3) 出力された id を下の <HYPERDRIVE_ID> に貼る
# 手動デプロイ(軽い入り方)ではこの id を手で入れる。後で Terraform 管理に import 可能。
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "b682f4dcc5944f72995071cb3353f975"

# Workers ネイティブ レート制限（workers.dev でも効く・ダッシュボード作業不要）。
# /api/auth/* を IP 単位で制限（ログイン試行の連打・コスト保護）。namespace_id は任意の一意値。
[[ratelimits]]
name = "AUTH_LIMITER"
namespace_id = "1001"
simple = { limit = 30, period = 60 }

# 非秘密の設定は [vars]、秘密は `wrangler secret put` で投入（リポジトリに置かない）。
[vars]
S3_REGION = "auto"
S3_ENDPOINT = "https://4d9f47fbb96473f1fb10e509ace25cd7.r2.cloudflarestorage.com"
S3_BUCKET = "mdcollab-docs-personal"
BASE_URL = "https://md.yskbase.com"
# ALLOWED_DOMAIN = "your-workspace-domain.com"

# secrets（`wrangler secret put <NAME>` で投入。リポジトリには置かない）:
#   SESSION_SECRET / ENCRYPTION_KEY
#   S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY
#   GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET   ← ログインを通す段階で投入
# ※ ENCRYPTION_KEY は一度決めたら変更しないこと（既存 AI キーの復号が不能になる）。

[[routes]]
pattern = "md.yskbase.com"
custom_domain = true
