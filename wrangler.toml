name = "mdcollab-api"
main = "src/adapters/cloudflare.ts"
compatibility_date = "2025-01-01"
# postgres.js を Workers で動かすため必須
compatibility_flags = ["nodejs_compat"]

# Hyperdrive(→Neon) は Phase 0 で作成して id を設定する。
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "<terraform 出力の hyperdrive id>"

# 非秘密の設定は [vars]、秘密は `wrangler secret put` で投入（リポジトリに置かない）。
[vars]
S3_REGION = "auto"
BASE_URL = "https://mdcollab.example.workers.dev"
# ALLOWED_DOMAIN = "your-workspace-domain.com"

# secrets（wrangler secret put で投入）:
#   SESSION_SECRET / GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
#   S3_ENDPOINT / S3_BUCKET / S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY
