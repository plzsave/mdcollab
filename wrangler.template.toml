# wrangler 設定の「テンプレート」。実際の wrangler.toml はこのファイルから
# scripts/gen-wrangler.sh が環境変数(.env / CI の GitHub Variables)で生成する。
#   - 生成物 wrangler.toml は .gitignore 済み（個人のアカウント値を含むためコミットしない）
#   - ローカル: cp .env.example .env して値を埋める → `bun run deploy` で自動生成
#   - CI: GitHub の Variables/Secrets から渡す（.github/workflows/ci.yml）
# プレースホルダ(env から流し込む): BASE_URL / S3_ENDPOINT / S3_BUCKET / S3_REGION / HYPERDRIVE_ID / WORKERS_DEV
name = "mdcollab-api"
main = "src/adapters/cloudflare.ts"
compatibility_date = "2026-06-01"
# postgres.js を Workers で動かすため必須
compatibility_flags = ["nodejs_compat"]

# CUSTOM_DOMAIN を設定すると gen-wrangler.sh が false にし、末尾に custom_domain route を付ける
# （workers.dev を無効化して独自ドメインだけを入口にする）。未設定なら true（workers.dev で動く）。
workers_dev = ${WORKERS_DEV}

# フロント(web/)の SPA を同一オリジンで配信。
#   - directory: vite build の出力（デプロイ前に `bun run build:web` 必須）
#   - run_worker_first=["/api/*"]: /api/* だけ Worker(API)へ、それ以外は Asset Worker
#   - not_found_handling=single-page-application: 静的に無いパスは index.html を返す(SPA ルーティング)
[assets]
directory = "web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/health"]

# Hyperdrive(→Postgres)。ID は `wrangler hyperdrive create` の出力値を ${HYPERDRIVE_ID} に渡す。
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "${HYPERDRIVE_ID}"

# Workers ネイティブ レート制限（best-effort）。厳密な制限は独自ドメイン+WAF を併用
# （docs/custom-domain-waf-ratelimit.md）。namespace_id は任意の一意値。
[[ratelimits]]
name = "AUTH_LIMITER"
namespace_id = "1001"
simple = { limit = 30, period = 60 }

# 非秘密の設定は [vars]、秘密は `wrangler secret put` で投入（リポジトリに置かない）。
[vars]
S3_REGION = "${S3_REGION}"
S3_ENDPOINT = "${S3_ENDPOINT}"
S3_BUCKET = "${S3_BUCKET}"
BASE_URL = "${BASE_URL}"
# ALLOWED_DOMAIN = "your-workspace-domain.com"

# secrets（`wrangler secret put <NAME>` で投入。リポジトリには置かない）:
#   SESSION_SECRET / ENCRYPTION_KEY
#   S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY
#   GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
# ※ ENCRYPTION_KEY は一度決めたら変更しないこと（既存 AI キーの復号が不能になる）。
